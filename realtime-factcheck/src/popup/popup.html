<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">⬡</span>
      <span class="title">InTruth</span>
    </div>

    <div class="status" id="status" data-i18n="statusInactive">Inactive</div>

    <div class="keys-section" id="keysSection">
      <div class="key-field">
        <label class="key-label" data-i18n="labelModel">Model</label>
        <select class="key-input key-select" id="modelSelect">
          <option value="haiku" data-i18n="optHaiku">Haiku — fastest, cheapest</option>
          <option value="sonnet" data-i18n="optSonnet">Sonnet — balanced</option>
          <option value="opus" data-i18n="optOpus">Opus — most capable</option>
        </select>
      </div>
      <div class="key-field">
        <label class="key-toggle">
          <input type="checkbox" id="useBridge"/>
          <span data-i18n="useBridge">Use local subscription (warm bridge)</span>
        </label>
        <div class="key-hint" id="bridgeHint" data-i18n="bridgeHint">Runs Claude via your subscription — start <code>warm-bridge.js</code> first.</div>
        <div class="bridge-warning" id="bridgeWarning" data-i18n="bridgeWarnText" hidden>⚠ Bridge not running — start it (see README).</div>
      </div>
      <div class="key-field" id="whisperModelField">
        <label class="key-label" data-i18n="labelWhisper">Transcription (local, WebGPU)</label>
        <select class="key-input key-select" id="whisperModel">
          <option value="tiny" data-i18n="optTiny">Tiny — fastest, least accurate</option>
          <option value="base" data-i18n="optBase">Base — balanced (recommended)</option>
          <option value="small" data-i18n="optSmall">Small — most accurate, heavier</option>
        </select>
        <div class="key-hint" id="whisperHint" data-i18n="whisperHint">Runs Whisper in your browser via WebGPU — no key, no cloud. First run downloads the model (cached afterwards).</div>
      </div>
      <div class="key-field" id="cacheSection">
        <label class="key-label" data-i18n="labelCache">Downloaded models</label>
        <div class="cache-list" id="cacheList">
          <div class="cache-empty" data-i18n="cacheChecking">Checking cache…</div>
        </div>
        <div class="cache-footer">
          <span class="cache-total" id="cacheTotal"></span>
          <button class="cache-clear" id="cacheClearBtn" data-i18n="cacheClear" hidden>Clear cache</button>
        </div>
      </div>
      <div class="key-field" id="apiKeyField">
        <label class="key-label" data-i18n="labelApiKey">Anthropic API Key</label>
        <input class="key-input" id="anthropicKey" type="password" placeholder="sk-ant-..." autocomplete="off"/>
      </div>
      <div class="key-field">
        <label class="key-label" data-i18n="labelLanguage">Language</label>
        <div class="lang-row">
          <span id="langFlag" class="lang-flag">🇺🇸</span>
          <select class="key-input key-select" id="languageSelect">
            <option value="auto" selected>auto</option>
            <option value="en">en</option>
            <option value="es">es</option>
            <option value="fr">fr</option>
            <option value="de">de</option>
            <option value="it">it</option>
            <option value="pt">pt</option>
            <option value="nl">nl</option>
            <option value="hi">hi</option>
            <option value="ja">ja</option>
            <option value="zh">zh</option>
            <option value="ar">ar</option>
            <option value="ko">ko</option>
            <option value="ru">ru</option>
            <option value="pl">pl</option>
            <option value="sv">sv</option>
            <option value="tr">tr</option>
          </select>
        </div>
      </div>
      <div class="key-hint" id="keyHint"></div>
    </div>

    <button class="toggle-btn" id="toggleBtn" data-i18n="btnStart">Start Fact-Checking</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
